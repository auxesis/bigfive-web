name: Test bigfive-web
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.9
          install: true
          cache: true
      - name: Setup dependencies
        run: mise run setup
      - name: Build the app
        run: mise run build
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.9
          install: true
          cache: true
      - name: Setup dependencies
        run: mise run setup
      - name: Start database
        run: mise run db:start
      - name: Apply migrations
        run: mise run db:migrate
      - name: Run tests
        run: mise run test
