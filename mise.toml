[tools]
bun = "latest"
node = "latest"
"npm:vercel" = "latest"
supabase = "latest"

[env]
NEXT_PUBLIC_ENV = "development"

# Supabase credentials: set in mise.local.toml
NEXT_PUBLIC_SUPABASE_URL = { required = true }
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = { required = true }

[tasks."dev"]
dir = "web"
run = "yarn run dev"

[tasks."db:migrate"]
dir = "web"
run = "supabase migration up"

[tasks."test"]
dir = "web"
run = """
bun run lint
bun run format
"""

[tasks."build"]
dir = "web"
run = """
bun run build
"""

[tasks."setup"]
dir = "web"
run = """
bun install
"""
